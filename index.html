<script>
// Map of GitHub repos that also have a PyPI package (for download counts)
const PYPI_PACKAGES = {
  'freelunchtheorem/Conditional_Density_Estimation': 'cde',
  'ferreirafabio/video2tfrecord': 'video2tfrecord',
  'ferreirafabio/tailgrid': 'tailgrid',
};

// Cache results in localStorage for 1 hour to avoid hammering APIs
const CACHE_TTL_MS = 60 * 60 * 1000;
function cacheGet(key) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    if (v && Date.now() - v.t < CACHE_TTL_MS) return v.d;
  } catch(e) {}
  return null;
}
function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), d: data })); } catch(e) {}
}

function formatCount(n) {
  if (n == null) return null;
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

async function fetchStars(owner, repo) {
  const key = `gh:${owner}/${repo}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
    if (!r.ok) return null;
    const d = await r.json();
    const stars = d.stargazers_count;
    cacheSet(key, stars);
    return stars;
  } catch(e) { return null; }
}

async function fetchDownloads(pkg) {
  const key = `pypi:${pkg}`;
  const cached = cacheGet(key);
  if (cached !== null) return cached;
  try {
    // pepy.tech has a JSON endpoint with total downloads. CORS is enabled.
    const r = await fetch(`https://api.pepy.tech/api/v2/projects/${pkg}`);
    if (!r.ok) return null;
    const d = await r.json();
    const total = d.total_downloads || (d.downloads && Object.values(d.downloads).reduce((a, b) => a + (typeof b === 'number' ? b : Object.values(b).reduce((x, y) => x + y, 0)), 0));
    cacheSet(key, total);
    return total;
  } catch(e) { return null; }
}

// Find every <p> in the rendered README that starts a "project" entry, i.e.
// contains a <strong><a href="github.com/owner/repo">name</a></strong>
function getProjectEntries(root) {
  const entries = [];
  root.querySelectorAll('p').forEach(p => {
    const a = p.querySelector('strong > a, a');
    if (!a) return;
    const m = (a.href || '').match(/github\.com\/([^\/\?#]+)\/([^\/\?#]+)/);
    if (!m) return;
    entries.push({ el: p, anchor: a, owner: m[1], repo: m[2].replace(/\.git$/, '') });
  });
  return entries;
}

function makeBadge(symbol, value, title) {
  const span = document.createElement('span');
  span.className = 'project-badge';
  span.title = title;
  span.innerHTML = `<span class="badge-symbol">${symbol}</span><span class="badge-value">${value}</span>`;
  return span;
}

async function enrichWithStats(root) {
  const entries = getProjectEntries(root);
  await Promise.all(entries.map(async ({ el, anchor, owner, repo }) => {
    const repoKey = `${owner}/${repo}`;
    const [stars, downloads] = await Promise.all([
      fetchStars(owner, repo),
      PYPI_PACKAGES[repoKey] ? fetchDownloads(PYPI_PACKAGES[repoKey]) : Promise.resolve(null),
    ]);
    const wrap = document.createElement('span');
    wrap.className = 'project-badges';
    if (stars != null) wrap.appendChild(makeBadge('★', formatCount(stars), `${stars.toLocaleString()} stars on GitHub`));
    if (downloads != null) wrap.appendChild(makeBadge('↓', formatCount(downloads), `${downloads.toLocaleString()} PyPI downloads (pepy.tech)`));
    if (wrap.children.length === 0) return;
    // Insert badges right after the anchor's parent (strong) so they sit next to the project name
    const target = anchor.parentElement && anchor.parentElement.tagName === 'STRONG' ? anchor.parentElement : anchor;
    target.parentNode.insertBefore(wrap, target.nextSibling);
  }));
}

// Fetch the profile README from GitHub and render as HTML via marked.js
async function loadReadme() {
  const urls = [
    'https://raw.githubusercontent.com/ferreirafabio/ferreirafabio/main/README.md',
    'https://raw.githubusercontent.com/ferreirafabio/ferreirafabio/master/README.md',
  ];
  const el = document.getElementById('content');
  for (const url of urls) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const md = await r.text();
      marked.setOptions({ gfm: true, breaks: false });
      el.innerHTML = marked.parse(md);
      // Open external links in a new tab
      el.querySelectorAll('a').forEach(a => {
        if (a.href && !a.href.startsWith(window.location.origin) && !a.href.startsWith('#')) {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
      });
      // Decorate project entries with stars + downloads (async, non-blocking)
      enrichWithStats(el);
      return;
    } catch (e) {
      console.warn('Failed to fetch', url, e);
    }
  }
  el.innerHTML = '<div class="error"><strong>Unable to load content.</strong> Please visit <a href="https://github.com/ferreirafabio">github.com/ferreirafabio</a> directly.</div>';
}

loadReadme();
</script>
